events {
    worker_connections 1024;
}

http {

    # ── Leave Service Load Balancer ──────────────────────
    upstream leave_service_cluster {
        # Round robin between 2 instances (default algorithm)
        server leave-service-1:3003;
        server leave-service-2:3003;

        # Health check — skip instance if it fails
        keepalive 32;
    }

    # ── Main Server ───────────────────────────────────────
    server {
        listen 80;

        # Add headers for tracing/debugging
        add_header X-Load-Balanced "true";

        # ── Leave Service routes (external clients) → Load Balanced ──
        location /api/leaves {
            # Strip /api prefix: /api/leaves/xyz → /leaves/xyz
            rewrite ^/api(/leaves.*) $1 break;
            proxy_pass http://leave_service_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Leave Service routes (internal api-gateway calls) → Load Balanced ──
        location /leaves {
            proxy_pass http://leave_service_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── All other routes → API Gateway ────────────────
        location / {
            proxy_pass http://api-gateway:3004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Health check endpoint ──────────────────────────
        location /nginx-health {
            return 200 'Nginx is running';
            add_header Content-Type text/plain;
        }
    }
}